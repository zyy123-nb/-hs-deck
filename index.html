<head>

  <title>炉石卡组推荐 — HS Deck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ====== 导航栏 ====== */
    .navbar {
      background: #16213e; padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 60px; border-bottom: 1px solid #0f3460;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 22px; font-weight: bold; color: #ffb347; display: flex; align-items: center; gap: 8px; }
    .nav-links { display: flex; gap: 24px; list-style: none; }
    .nav-links a { color: #ccc; font-size: 14px; padding: 8px 0; border-bottom: 2px solid transparent; transition: color 0.3s, border-color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: #ffb347; border-bottom-color: #ffb347; }

    /* ====== 统计栏 ====== */
    .stats-bar {
      background: linear-gradient(135deg, #16213e 0%, #1a1a3e 100%);
      padding: 20px 24px; border-bottom: 1px solid #0f3460;
      display: flex; gap: 32px; flex-wrap: wrap; align-items: center;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: 28px; font-weight: bold; color: #ffb347; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .stat-divider { width: 1px; height: 40px; background: #0f3460; }

    /* 排序 */
    .sort-group { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .sort-label { font-size: 13px; color: #888; }
    .sort-select {
      background: #11111b; border: 1px solid #333; color: #eee;
      padding: 8px 14px; border-radius: 8px; font-size: 13px;
      outline: none; cursor: pointer;
    }
    .sort-select:focus { border-color: #ffb347; }

    /* ====== 筛选栏 ====== */
    .filter-bar {
      background: #16213e; padding: 14px 24px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid #0f3460;
    }
    .filter-label { font-size: 13px; color: #888; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid #333;
      background: transparent; color: #aaa; font-size: 13px; cursor: pointer;
      transition: all 0.25s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: #ffb347; color: #ffb347; }
    .filter-btn.active { background: #ffb347; color: #1a1a2e; border-color: #ffb347; font-weight: bold; }
    .search-input {
      background: #11111b; border: 1px solid #333; color: #eee;
      padding: 8px 14px; border-radius: 20px; font-size: 13px; width: 180px;
      outline: none; transition: border-color 0.25s; margin-left: auto;
    }
    .search-input:focus { border-color: #ffb347; }
    .search-input::placeholder { color: #666; }
    .result-count { font-size: 13px; color: #888; margin-left: 6px; white-space: nowrap; }

    /* ====== 主内容 ====== */
    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .page-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .page-title { font-size: 28px; }
    .page-subtitle { font-size: 14px; color: #888; }

    /* ====== 卡组网格 ====== */
    .deck-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .deck-card {
      background: #16213e; border-radius: 12px; padding: 20px; width: 280px;
      border: 1px solid #0f3460; cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex; flex-direction: column; gap: 10px;
    }
    .deck-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(255,179,71,0.12); border-color: #ffb347; }
    .deck-header { display: flex; align-items: center; justify-content: space-between; }
    .deck-class { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 6px; }
    .class-icon { font-size: 22px; }
    .tier-badge { padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .tier-S { background: #ffb347; color: #1a1a2e; }
    .tier-A { background: #4caf50; color: white; }
    .tier-B { background: #2196f3; color: white; }
    .deck-name { font-size: 18px; font-weight: bold; color: #fff; }
    .deck-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { padding: 2px 10px; border-radius: 12px; font-size: 11px; background: #0f3460; color: #aaa; }
    .deck-stats { display: flex; gap: 16px; font-size: 13px; color: #888; }
    .stat-value { color: #ffb347; font-weight: bold; }
    .stat-win-high { color: #4caf50; }
    .stat-win-mid  { color: #ffb347; }
    .stat-win-low  { color: #f44336; }
    .deck-desc { font-size: 13px; color: #777; line-height: 1.5; }
    .deck-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
    .view-detail { font-size: 12px; color: #ffb347; opacity: 0; transition: opacity 0.3s; }
    .deck-card:hover .view-detail { opacity: 1; }

    /* ====== 空结果 ====== */
    .no-result { text-align: center; padding: 80px 20px; color: #666; width: 100%; }
    .no-result .big { font-size: 60px; margin-bottom: 16px; }

    /* ====== 详情弹窗 ====== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: #16213e; border-radius: 16px; max-width: 600px; width: 90%;
      max-height: 85vh; overflow-y: auto; padding: 32px;
      border: 1px solid #0f3460; transform: translateY(20px); transition: transform 0.3s;
      position: relative;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: none; color: #888; font-size: 24px;
      cursor: pointer; transition: color 0.2s; line-height: 1;
    }
    .modal-close:hover { color: #ffb347; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .modal-class { font-size: 16px; color: #ccc; display: flex; align-items: center; gap: 8px; }
    .modal-class .big-icon { font-size: 36px; }
    .modal-name { font-size: 26px; font-weight: bold; margin-bottom: 4px; }
    .modal-tier { display: inline-block; padding: 4px 14px; border-radius: 4px; font-size: 14px; font-weight: bold; }
    .modal-stats { display: flex; gap: 24px; margin: 16px 0; padding: 14px; background: #11111b; border-radius: 8px; }
    .modal-stat { text-align: center; }
    .modal-stat .num { font-size: 22px; font-weight: bold; color: #ffb347; }
    .modal-stat .lbl { font-size: 11px; color: #888; }
    .modal-section { margin-top: 20px; }
    .modal-section h3 { color: #ffb347; font-size: 15px; margin-bottom: 10px; border-bottom: 1px solid #0f3460; padding-bottom: 6px; }
    .key-card { display: inline-flex; align-items: center; gap: 6px; background: #11111b; padding: 6px 12px; border-radius: 6px; margin: 4px; font-size: 13px; }
    .key-card .mana { background: #2196f3; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    .matchup-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .matchup-col { flex: 1; min-width: 200px; }
    .matchup-col h4 { font-size: 13px; margin-bottom: 6px; }
    .matchup-good { color: #4caf50; font-size: 13px; }
    .matchup-bad  { color: #f44336; font-size: 13px; }
    .matchup-item { padding: 3px 0; font-size: 13px; color: #aaa; }

    /* ====== 底部 ====== */
    .footer { background: #16213e; text-align: center; padding: 24px; color: #666; font-size: 13px; border-top: 1px solid #0f3460; margin-top: 40px; }

    /* ====== 响应式 ====== */
    @media (max-width: 640px) {
      .navbar { padding: 0 12px; }
      .nav-links { gap: 12px; }
      .nav-links a { font-size: 12px; }
      .stats-bar { padding: 14px; gap: 16px; }
      .stat-num { font-size: 22px; }
      .sort-group { margin-left: 0; }
      .filter-bar { padding: 10px 12px; gap: 6px; }
      .filter-btn { font-size: 11px; padding: 5px 10px; }
      .search-input { width: 100%; margin-left: 0; }
      .main { padding: 16px; }
      .deck-card { width: 100%; }
      .modal { padding: 20px; }
    }
  </style>
</head>

      { hero:"萨满",     icon:"🦅", name:"图腾萨",       tier:"B", tags:["快攻","铺场"],    winRate:49.3, dust:5200,  desc:"低费随从+图腾Buff，4费分裂战斧复制全场。造价最低的传说卡组。", keyCards:[{name:"分裂战斧",cost:4},{name:"图腾魔像",cost:2},{name:"大漩涡传送门",cost:2},{name:"火舌图腾",cost:2}], goodVs:["动物园","奥秘法"], badVs:["防战","控制萨","冰DK"] },
      { hero:"萨满",     icon:"🦅", name:"控制萨",       tier:"A", tags:["控制","战吼"],    winRate:53.8, dust:13200, desc:"沙德沃克无限战吼，女巫哈加莎后期无限资源。打谁都能赢。", keyCards:[{name:"沙德沃克",cost:9},{name:"女巫哈加莎",cost:8},{name:"火山喷发",cost:5},{name:"治疗之雨",cost:3}], goodVs:["快攻瞎","海盗战","快攻猎","报告骑"], badVs:["奇迹德","手牌术"] },
      { hero:"牧师",     icon:"💀", name:"复活牧",       tier:"A", tags:["控制","复活"],    winRate:54.2, dust:16000, desc:"永恒奴役+法术钻石反复拉大哥，对面解完一波还有一波。贵但强。", keyCards:[{name:"永恒奴役",cost:4},{name:"法术钻石",cost:7},{name:"暗言术灭",cost:3},{name:"大蓝龙",cost:9}], goodVs:["防战","手牌术","冰DK"], badVs:["奇数贼","报告骑","快攻瞎"] },
      { hero:"牧师",     icon:"💀", name:"暗牧",         tier:"B", tags:["快攻","暗影"],    winRate:48.1, dust:6800,  desc:"暗影形态抢节奏，暗言术灭清嘲讽，心灵震爆补伤害。快攻牧师异端玩法。", keyCards:[{name:"暗影形态",cost:2},{name:"心灵震爆",cost:2},{name:"暗言术痛",cost:2},{name:"暗言术灭",cost:3}], goodVs:["动物园","手牌术"], badVs:["防战","快攻瞎","报告骑"] },
      { hero:"恶魔猎手", icon:"👹", name:"亡语瞎",       tier:"A", tags:["中速","亡语"],    winRate:54.0, dust:10400, desc:"亡语触发配合恶魔变形，日怒+凯恩血蹄中期碾压。节奏拉满。", keyCards:[{name:"凯恩·日怒",cost:4},{name:"恶魔变形",cost:5},{name:"伊利达雷",cost:3},{name:"亡语者",cost:2}], goodVs:["手牌术","奇迹德"], badVs:["防战","控制萨","报告骑"] },
      { hero:"恶魔猎手", icon:"👹", name:"快攻瞎",       tier:"S", tags:["快攻","铺场"],    winRate:55.8, dust:5600,  desc:"伊利达雷+战斗邪犬急速铺场，凯恩日怒过墙斩杀。环境定义者。", keyCards:[{name:"战斗邪犬",cost:1},{name:"凯恩·日怒",cost:4},{name:"吞噬魔法",cost:1},{name:"伊利达雷审问官",cost:3}], goodVs:["奇迹德","手牌术","奥秘法","动物园"], badVs:["防战","控制萨"] },
      { hero:"死亡骑士", icon:"❄️", name:"冰DK",         tier:"A", tags:["控制","冰霜"],    winRate:52.3, dust:12800, desc:"冰霜疫病控场，辛达苟萨冻结，亡语者女士后期终结。稳扎稳打。", keyCards:[{name:"辛达苟萨",cost:7},{name:"冰霜疫病",cost:2},{name:"亡语者女士",cost:8},{name:"冰龙吐息",cost:3}], goodVs:["快攻瞎","海盗战","快攻猎","动物园"], badVs:["奇迹德","手牌术","复活牧"] },
      { hero:"死亡骑士", icon:"❄️", name:"血DK",         tier:"B", tags:["控制","鲜血"],    winRate:47.5, dust:14800, desc:"吸血回血续航拉满，血色十字军+鲜血女王后期碾压。慢但肉到对面绝望。", keyCards:[{name:"鲜血女王",cost:8},{name:"血色十字军",cost:6},{name:"吸血鬼之触",cost:1},{name:"灵魂虹吸",cost:5}], goodVs:["快攻瞎","海盗战","快攻猎"], badVs:["奇迹德","复活牧","手牌术"] },
    ];

    // ====== 状态 ======
    let currentClass = "all", currentTier = "all", currentSearch = "", currentSort = "winRate";

    // ====== 胜率颜色 ======
    function winClass(rate) {
      if (rate >= 55) return "stat-win-high";
      if (rate >= 50) return "stat-win-mid";
      return "stat-win-low";
    }

    // ====== 排序 ======
    function sortDecks(arr) {
      if (currentSort === "winRate") return arr.sort((a,b) => b.winRate - a.winRate);
      if (currentSort === "dust")    return arr.sort((a,b) => a.dust - b.dust);
      if (currentSort === "name")    return arr.sort((a,b) => a.name.localeCompare(b.name, "zh"));
      return arr;
    }

    // ====== 渲染 ======
    function render() {
      let filtered = decks.filter(d => {
        if (currentClass !== "all" && d.hero !== currentClass) return false;
        if (currentTier !== "all" && d.tier !== currentTier) return false;
        if (currentSearch && !d.name.includes(currentSearch)) return false;
        return true;
      });
      filtered = sortDecks([...filtered]);

      document.getElementById("resultCount").textContent = `共 ${filtered.length} 套`;
      document.getElementById("countAll").textContent = filtered.length;

      // 更新统计栏
      const sCount = filtered.filter(d=>d.tier==="S").length;
      const aCount = filtered.filter(d=>d.tier==="A").length;
      const bCount = filtered.filter(d=>d.tier==="B").length;
      document.getElementById("countS").textContent = sCount;
      document.getElementById("countA").textContent = aCount;
      document.getElementById("countB").textContent = bCount;

      const grid = document.getElementById("deckGrid");
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-result"><div class="big">🔍</div><p>没有找到匹配的卡组</p><p style="font-size:13px;margin-top:8px;">试试换个筛选条件</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map((d,i) => `
        <div class="deck-card" onclick="openModal('${d.name}')">
          <div class="deck-header">
            <span class="deck-class"><span class="class-icon">${d.icon}</span> ${d.hero}</span>
            <span class="tier-badge tier-${d.tier}">${d.tier}</span>
          </div>
          <div class="deck-name">${d.name}</div>
          <div class="deck-tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
          <div class="deck-stats">
            <span>胜率 <span class="stat-value ${winClass(d.winRate)}">${d.winRate}%</span></span>
            <span>费用 <span class="stat-value">${d.dust}</span></span>
          </div>
          <div class="deck-desc">${d.desc}</div>
          <div class="deck-footer"><span class="view-detail">点击查看详情 →</span></div>
        </div>
      `).join("");
    }

    // ====== 打开详情弹窗 ======
    function openModal(name) {
      const d = decks.find(x => x.name === name);
      if (!d) return;

      const overlay = document.getElementById("modalOverlay");
      const content = document.getElementById("modalContent");

      content.innerHTML = `
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">✕</button>
        <div class="modal-header">
          <div>
            <div class="modal-class"><span class="big-icon">${d.icon}</span> ${d.hero}</div>
            <div class="modal-name">${d.name}</div>
          </div>
          <span class="modal-tier tier-badge tier-${d.tier}" style="font-size:18px; padding:6px 18px;">${d.tier} 级</span>
        </div>

        <div class="modal-stats">
          <div class="modal-stat"><div class="num" style="color:${d.winRate>=55?'#4caf50':d.winRate>=50?'#ffb347':'#f44336'}">${d.winRate}%</div><div class="lbl">胜率</div></div>
          <div class="modal-stat"><div class="num">${d.dust}</div><div class="lbl">奥术之尘</div></div>
          <div class="modal-stat"><div class="num">${d.tags.join("/")}</div><div class="lbl">类型</div></div>
        </div>

        <p style="color:#aaa; line-height:1.7;">${d.desc}</p>

        <div class="modal-section">
          <h3>🗝️ 核心单卡</h3>
          ${d.keyCards.map(c => `<span class="key-card"><span class="mana">${c.cost}</span> ${c.name}</span>`).join("")}
        </div>

        <div class="modal-section">
          <h3>📊 对局优劣</h3>
          <div class="matchup-row">
            <div class="matchup-col">
              <h4 class="matchup-good">✅ 优势对局</h4>
              ${d.goodVs.map(m => `<div class="matchup-item">🟢 ${m}</div>`).join("")}
            </div>
            <div class="matchup-col">
              <h4 class="matchup-bad">❌ 劣势对局</h4>
              ${d.badVs.map(m => `<div class="matchup-item">🔴 ${m}</div>`).join("")}
            </div>
          </div>
        </div>
      `;

      overlay.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    // ====== 关闭弹窗 ======
    function closeModal(e) {
      if (e.target === document.getElementById("modalOverlay")) {
        document.getElementById("modalOverlay").classList.remove("show");
        document.body.style.overflow = "";
      }
    }
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        document.getElementById("modalOverlay").classList.remove("show");
        document.body.style.overflow = "";
      }
    });

    // ====== 筛选按钮 ======
    document.getElementById("filterBar").addEventListener("click", e => {
      if (!e.target.classList.contains("filter-btn")) return;
      const btn = e.target, type = btn.dataset.type, value = btn.dataset.value;
      document.getElementById("filterBar").querySelectorAll(`[data-type="${type}"]`).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (type === "class") currentClass = value;
      if (type === "tier")  currentTier  = value;
      render();
    });

    // ====== 搜索 ======
    document.getElementById("searchInput").addEventListener("input", function() {
      currentSearch = this.value.trim();
      render();
    });

    // ====== 排序 ======
    document.getElementById("sortSelect").addEventListener("change", function() {
      currentSort = this.value;
      render();
    });

    // ====== 首次加载 ======
    render();
  </script>
</body>
</html>
